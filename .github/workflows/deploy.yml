name: Build and Deploy to Google Cloud Run

on:
  push:
    branches:
      - main  # Adjust to your default branch if preferred (e.g., master)

env:
  PROJECT_ID: smooth-operator-sf # Replace with your active Google Cloud project ID
  GAR_LOCATION: us-east1         # Map to your deployment region
  REPOSITORY: smooth-operator    # Name of your Google Artifact Registry repository
  SERVICE: booking-portal        # Name of your Cloud Run service
  REGION: us-east1               # Region where Cloud Run is hosted

jobs:
  deploy:
    name: Build & Release Container
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Crucial for using Google Federated Workload Credentials

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      # ==========================================
      # 1. AUTHENTICATE TO GOOGLE CLOUD
      # ==========================================
      # Setup Workload Identity Federation to securely connect GitHub to Google Cloud 
      # without storing sensitive long-lived service account JSON keys.
      - name: Google Cloud Authentication
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Configuration for Workload Identity Federation
          # To set this up, refer to: https://github.com/google-github-actions/auth#workload-identity-federation
          workload_identity_provider: 'projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-workflow-deployer@smooth-operator-sf.iam.gserviceaccount.com'

      # ==========================================
      # 2. LOGIN TO ARTIFACT REGISTRY
      # ==========================================
      - name: Setup Docker Credentials
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: _json_key_byfile
          password: ${{ steps.auth.outputs.credentials_file_path }}

      # ==========================================
      # 3. BUILD AND PUSH CONTAINER
      # ==========================================
      - name: Build, Tag and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:latest
          # Leverages GitHub Actions native cache to keep incremental builds extremely fast
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==========================================
      # 4. DEPLOY TO GOOGLE CLOUD RUN
      # ==========================================
      - name: Deploy Container to Google Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: |
            --port=3000
            --allow-unauthenticated
          # Sets required variables securely inside the cloud container
          env_vars: |
            NODE_ENV=production

      # ==========================================
      # 5. DIAGNOSTICS FEEDBACK
      # ==========================================
      - name: Active Deployment Showcase
        run: echo "Your web app successfully went live at ${{ steps.deploy.outputs.url }}"
